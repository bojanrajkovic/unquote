apiVersion: v1
kind: Secret
metadata:
  name: api-secret
  namespace: unquote
type: Opaque
stringData:
  DATABASE_URL: postgresql://unquote:unquote-dev@postgres:5432/unquote
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unquote-api
  namespace: unquote
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unquote-api
  template:
    metadata:
      labels:
        app: unquote-api
    spec:
      containers:
        - name: api
          image: unquote-api:local
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: unquote-api
  namespace: unquote
spec:
  type: NodePort
  selector:
    app: unquote-api
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
