name: TUI - Release

on:
  push:
    branches:
      - main
    paths:
      - 'tui/**'
      - '.github/workflows/tui-*.yml'
    tags-ignore:
      - '**'

permissions: {} # job-level permissions only

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-release:
    name: Check if Release Needed
    permissions:
      contents: read # checkout + git log
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check commit type and changed paths
        id: check
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          # Check ALL commits in the push for a release-triggering type
          HAS_RELEASE_COMMIT=false
          for msg in $(git log --pretty=%s "$BEFORE_SHA"..HEAD); do
            if [[ $msg =~ ^(feat|fix)(\(.+\))?!?: ]]; then
              HAS_RELEASE_COMMIT=true
              echo "Found release-triggering commit: $msg"
              break
            fi
          done
          if [ "$HAS_RELEASE_COMMIT" = false ]; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "No feat/fix commits in push range"
            exit 0
          fi
          # Ensure actual tui/ source files changed across the full push range
          if git diff --name-only "$BEFORE_SHA" HEAD -- 'tui/' | grep -qv '^\.' ; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "Release-triggering commit with tui/ changes detected"
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "No tui/ source changes, skipping release"
          fi

  ci-checks:
    name: CI Checks
    permissions:
      contents: read # checkout + run tests
    runs-on: ubuntu-latest
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          experimental: true
          working_directory: tui

      - name: Cache Go modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-
          lookup-only: true

      - name: Run CI checks
        working-directory: tui
        run: mise run :ci

  release:
    name: Create Release
    permissions:
      contents: write # push git tags + create GitHub release
    runs-on: ubuntu-latest
    needs: [check-release, ci-checks]
    if: needs.check-release.outputs.should_release == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Calculate version
        id: version
        uses: PaulHatch/semantic-version@f29500c9d60a99ed5168e39ee367e0976884c46e # v6.0.1
        with:
          tag_prefix: "v"
          change_path: "tui/"
          version_format: "${major}.${minor}.${patch}"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          TAG="v${STEPS_VERSION_OUTPUTS_VERSION}"
          echo "Creating tag: $TAG"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STEPS_VERSION_OUTPUTS_VERSION: ${{ steps.version.outputs.version }}

      - name: Setup mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          cache: false
          experimental: true
          working_directory: tui

      - name: Cache Go modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-
          lookup-only: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
          workdir: tui
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_BRANCH: main
