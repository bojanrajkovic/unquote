name: API - Docker PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: read # checkout source code
  pull-requests: read # paths-filter reads PR diff

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
              - '.github/workflows/api-docker-pr.yml'

  validate:
    name: Validate Build
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr

      - name: Build (validation only)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./api
          push: false
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=api-linux/amd64
          cache-to: type=gha,scope=api-linux/amd64,mode=max

  api-result:
    name: API Result
    needs: [changes, validate]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${NEEDS_CHANGES_OUTPUTS_API}" != "true" ]]; then
            echo "No API changes, skipping"
            exit 0
          fi
          if [[ "${NEEDS_VALIDATE_RESULT}" != "success" ]]; then
            echo "API validation failed: ${NEEDS_VALIDATE_RESULT}"
            exit 1
          fi
          echo "All API checks passed"
        env:
          NEEDS_CHANGES_OUTPUTS_API: ${{ needs.changes.outputs.api }}
          NEEDS_VALIDATE_RESULT: ${{ needs.validate.result }}
