name: API - Docker PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: read # checkout source code
  pull-requests: read # paths-filter reads PR diff

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
              - '.github/workflows/api-docker-pr.yml'

  validate:
    name: Validate Build
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr

      - name: Build (validation only)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./api
          push: false
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=api-linux/amd64
          cache-to: type=gha,scope=api-linux/amd64,mode=max

  api-result:
    name: API Result
    needs: [changes, validate]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${NEEDS_CHANGES_OUTPUTS_API}" != "true" ]]; then
            echo "No API changes, skipping"
            exit 0
          fi
          if [[ "${NEEDS_VALIDATE_RESULT}" != "success" ]]; then
            echo "API validation failed: ${NEEDS_VALIDATE_RESULT}"
            exit 1
          fi
          echo "All API checks passed"
        env:
          NEEDS_CHANGES_OUTPUTS_API: ${{ needs.changes.outputs.api }}
          NEEDS_VALIDATE_RESULT: ${{ needs.validate.result }}
