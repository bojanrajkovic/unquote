name: Web - PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: read # checkout source code
  pull-requests: read # paths-filter reads PR diff

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          filters: |
            web:
              - 'web/**'
              - '.github/workflows/web-pr.yml'

  validate:
    name: Validate
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          experimental: true
          working_directory: web

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Sync SvelteKit
        working-directory: web
        run: pnpm exec svelte-kit sync

      - name: Typecheck
        working-directory: web
        run: pnpm run check

      - name: Format check
        working-directory: web
        run: pnpm run format --check

      - name: Unit tests (with coverage)
        working-directory: web
        run: pnpm run coverage

      - name: Build
        working-directory: web
        run: pnpm run build

      - name: Install Playwright browsers
        working-directory: web
        run: pnpm exec playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: web
        run: pnpm run test:e2e

      - name: Upload E2E screenshots
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: e2e-screenshots
          path: web/test-results/*.png
          retention-days: 7
          if-no-files-found: ignore

  comment:
    name: PR Screenshot Comment
    needs: validate
    if: always() && needs.validate.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Find existing comment
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "E2E Screenshots"

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            ## E2E Screenshots

            Screenshots captured from Playwright E2E tests.
            Download from [Actions artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

            > Updated for commit ${{ github.event.pull_request.head.sha }}

  web-result:
    name: Web Result
    needs: [changes, validate]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${NEEDS_CHANGES_OUTPUTS_WEB}" != "true" ]]; then
            echo "No web changes, skipping"
            exit 0
          fi
          if [[ "${NEEDS_VALIDATE_RESULT}" != "success" ]]; then
            echo "Web validation failed: ${NEEDS_VALIDATE_RESULT}"
            exit 1
          fi
          echo "All web checks passed"
        env:
          NEEDS_CHANGES_OUTPUTS_WEB: ${{ needs.changes.outputs.web }}
          NEEDS_VALIDATE_RESULT: ${{ needs.validate.result }}
