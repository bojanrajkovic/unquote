name: Web - Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'
      - '.github/workflows/web-deploy.yml'
    tags-ignore:
      - '**'

permissions: {} # job-level permissions only

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # Never cancel: mid-sync cancellation leaves bucket in partial state

jobs:
  validate:
    name: Validate
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          experimental: true
          working_directory: web

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Sync SvelteKit
        working-directory: web
        run: pnpm exec svelte-kit sync

      - name: Typecheck
        working-directory: web
        run: pnpm run check

      - name: Format check
        working-directory: web
        run: pnpm run format --check

      - name: Test
        working-directory: web
        run: pnpm run test

  deploy:
    name: Build and Deploy
    needs: validate
    permissions:
      contents: read   # checkout source
      id-token: write  # REQUIRED: lets GitHub issue the OIDC JWT for AWS role assumption
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          cache: false
          experimental: true
          working_directory: web

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: web
        run: pnpm run build
        env:
          VITE_API_URL: ${{ vars.API_URL }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-web-deploy
          aws-region: us-east-1

      - name: Sync to S3
        run: |
          aws s3 sync web/build/ s3://${{ vars.S3_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"
          # HTML files: short cache (must revalidate so new deploys take effect quickly)
          # NOTE: --exclude must come before --include; AWS CLI processes filters
          # left-to-right with later rules taking precedence.
          aws s3 sync web/build/ s3://${{ vars.S3_BUCKET }} \
            --delete \
            --cache-control "public, max-age=0, must-revalidate" \
            --exclude "*" \
            --include "*.html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CF_DISTRIBUTION_ID }} \
            --paths "/*"
